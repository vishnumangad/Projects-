<html>
<head>
<style>
body{
display:flex;
background-color:black;
min-height:100vh;
}
.container{
width:95%;
height:350px;
position:relative;
transform-style:preserve-3d;
transform:perspective(1000px);
animation:gallery 20s linear infinite;
cursor:pointer;


}
.card{
height:350px;
width:200px;
border:4px ridge white;
color:white;
text-shadow:16px 16px 32px green;
}
.container span{
position:absolute;
width:100%;
height:100%;
transform-style:preserve-3d;
transform:rotateY(calc(var(--i)*45deg));
}
.container span div{
position:absolute;
border-radius:10px;
border:5px ridge #ccc;
-webkit-box-reflect:below 2.5px linear-gradient
(transparent,transparent rgba(3,3,3,0.2));
}
@keyframes gallery{

0%{
transform:perspective(1000px)
rotateY(0deg);
}
100%{
transform:perspective(1000px)
rotateY(360deg);
}}
</style>
</head>
<body topmargin="150px">
<div class="container">
<span style="--i:1"><img class="card"src="bm1.jpg"></span>
<span style="--i:2"><img class="card"src="bm2.jpg"></span>
<span style="--i:3"><img class="card"src="bm3.jpg"></span>
<span style="--i:4"><img class="card"src="bm4.jpg"></span>
<span style="--i:5"><img class="card"src="bm5.jpg"></span>
<span style="--i:6"><img class="card"src="bm6.jpg"></span>
<span style="--i:7"><img class="card"src="bm3.jpg"></span>
<span style="--i:8"><img class="card"src="bm5.jpg"></span>
</div>
</body>
</html>
